<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools Collection</title>
    <link rel="stylesheet" href="root.css">
    <link rel="stylesheet" href="main.css">
    <style>
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .tool-card {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }
        .tool-card:hover {
            transform: translateY(-5px);
        }
        .tool-card .card {
            padding: 1.5rem;
            height: 100%;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .tool-card h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .tool-card p {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        header {
            justify-content: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Tools Collection</h1>
    </header>
    
    <main>
        <div class="tools-grid">
            <a href="html_viewer.html" class="tool-card">
                <section class="card">
                    <h2>HTML Viewer</h2>
                    <p>Live preview for HTML code</p>
                </section>
            </a>
            <a href="whois.html" class="tool-card">
                <section class="card">
                    <h2>WHOIS Lookup</h2>
                    <p>Retrieve WHOIS/RDAP information for domains</p>
                </section>
            </a>
        </div>
    </main>
</body>
</html>
