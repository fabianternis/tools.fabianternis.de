<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools Collection</title>
    <link rel="stylesheet" href="root.css">
    <link rel="stylesheet" href="main.css">
    <style>
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
            width: 100%;
        }
        .tool-card {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }
        .tool-card .card {
            padding: 2.5rem 2rem;
            height: 100%;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-width: 2px;
            background: linear-gradient(135deg, var(--card-bg) 0%, var(--sidebar-bg) 100%);
        }
        .tool-card:hover .card {
            transform: translateY(-8px);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-lg);
        }
        .tool-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        .tool-card p {
            font-size: 1rem;
            color: var(--secondary-color);
            line-height: 1.6;
        }
        .tool-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        header {
            justify-content: center;
            padding: 2rem;
        }
        header h1 {
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Tools Collection</h1>
    </header>
    
    <main style="display: block;">
        <div class="tools-grid">
            <a href="html_viewer.html" class="tool-card">
                <section class="card">
                    <span class="tool-icon">🌐</span>
                    <h2>HTML Viewer</h2>
                    <p>Professional live preview for your HTML and CSS code snippets.</p>
                </section>
            </a>
            <a href="whois.html" class="tool-card">
                <section class="card">
                    <span class="tool-icon">🔍</span>
                    <h2>WHOIS Lookup</h2>
                    <p>Instant domain registration details and networking information.</p>
                </section>
            </a>
        </div>
    </main>
</body>
</html>
